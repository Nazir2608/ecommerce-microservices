# ─────────────────────────────────────────────────────────────────────────────
# Prometheus Alert Rules — Phase 7
#
#   Alert anatomy:
#   alert:  name shown in Grafana/Alertmanager
#   expr:   PromQL expression that evaluates to true/false
#   for:    condition must be true for this long before firing
#   labels: severity, team — used for routing in Alertmanager
#   annotations: human-readable description injected into notification
# ─────────────────────────────────────────────────────────────────────────────

groups:

  # ── Service availability ───────────────────────────────────────────────────
  - name: service_availability
    rules:

      - alert: ServiceDown
        expr: up == 0
        for: 30s
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Service {{ $labels.job }} is DOWN"
          description: "{{ $labels.job }} on {{ $labels.instance }} has been unreachable for 30+ seconds. Prometheus cannot scrape /actuator/prometheus."

      - alert: ServiceHighErrorRate
        # HTTP 5xx rate > 5% of total requests for 5 minutes
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (job)
          /
          sum(rate(http_server_requests_seconds_count[5m])) by (job)
          > 0.05
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "{{ $labels.job }} error rate is {{ $value | humanizePercentage }}. More than 5% of requests are returning 5xx."

  # ── JVM health ─────────────────────────────────────────────────────────────
  - name: jvm_health
    rules:

      - alert: HighHeapUsage
        # Heap used > 85% of max heap
        expr: |
          jvm_memory_used_bytes{area="heap"}
          /
          jvm_memory_max_bytes{area="heap"}
          > 0.85
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High JVM heap usage on {{ $labels.job }}"
          description: "{{ $labels.job }} heap is at {{ $value | humanizePercentage }}. Consider increasing heap size or investigating memory leaks."

      - alert: CriticalHeapUsage
        expr: |
          jvm_memory_used_bytes{area="heap"}
          /
          jvm_memory_max_bytes{area="heap"}
          > 0.95
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "CRITICAL heap usage on {{ $labels.job }} — OOM imminent"
          description: "{{ $labels.job }} heap is at {{ $value | humanizePercentage }}. OutOfMemoryError is likely. Restart may be required."

      - alert: HighGCPause
        # Average GC pause > 500ms
        expr: |
          rate(jvm_gc_pause_seconds_sum[5m])
          /
          rate(jvm_gc_pause_seconds_count[5m])
          > 0.5
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High GC pause time on {{ $labels.job }}"
          description: "Average GC pause on {{ $labels.job }} is {{ $value | humanizeDuration }}. Application may experience latency spikes."

  # ── HTTP latency ───────────────────────────────────────────────────────────
  - name: http_latency
    rules:

      - alert: SlowResponses
        # p95 latency > 2 seconds
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_server_requests_seconds_bucket[5m])) by (job, le)
          ) > 2
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Slow p95 response time on {{ $labels.job }}"
          description: "95th percentile latency on {{ $labels.job }} is {{ $value | humanizeDuration }}. Threshold is 2s."

  # ── Circuit breakers ───────────────────────────────────────────────────────
  - name: circuit_breakers
    rules:

      - alert: CircuitBreakerOpen
        # Resilience4j: state 2 = OPEN
        expr: resilience4j_circuitbreaker_state == 2
        for: 0s   # alert immediately when circuit opens
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Circuit breaker OPEN: {{ $labels.name }} on {{ $labels.job }}"
          description: "The circuit breaker for {{ $labels.name }} has opened on {{ $labels.job }}. Downstream service calls are being rejected. Fallback is active."

  # ── Kafka consumer lag ─────────────────────────────────────────────────────
  - name: kafka_health
    rules:

      - alert: KafkaConsumerLag
        # Consumer lag > 1000 messages for > 5 minutes
        expr: kafka_consumer_fetch_manager_records_lag_max > 1000
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Kafka consumer lag on {{ $labels.job }}"
          description: "Consumer group on {{ $labels.job }} is {{ $value }} messages behind. May indicate processing bottleneck."

  # ── Database connection pools ──────────────────────────────────────────────
  - name: database_pools
    rules:

      - alert: ConnectionPoolExhausted
        # HikariCP: active connections / max pool size > 90%
        expr: |
          hikaricp_connections_active
          /
          hikaricp_connections_max
          > 0.90
        for: 2m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "DB connection pool near exhaustion on {{ $labels.job }}"
          description: "{{ $labels.job }} connection pool is {{ $value | humanizePercentage }} full. Requests may queue or fail."
