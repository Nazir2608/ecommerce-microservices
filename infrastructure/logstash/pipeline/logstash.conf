# Logstash pipeline — reads from stdin (Docker log driver), writes to Elasticsearch
#
#   Logstash input → filter → output:
#   input:  WHERE to read logs from (stdin, file, beats, Kafka, etc.)
#   filter: HOW to parse and enrich each log line
#   output: WHERE to send processed logs

input {
  # Read JSON logs from TCP
  tcp {
    port => 5044
    codec => json
  }
}

filter {
  # Parse @timestamp if present
  if [@timestamp] {
    date {
      match => [ "@timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }

  # Add index date for time-based Kibana indices
  mutate {
    add_field => { "[@metadata][index_date]" => "%{+YYYY.MM.dd}" }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    # Index per service per day: ecommerce-user-service-2024.01.15
    index => "ecommerce-%{[service]}-%{[@metadata][index_date]}"
  }

  # Also print to stdout for debugging
  stdout {
    codec => rubydebug { metadata => false }
  }
}
