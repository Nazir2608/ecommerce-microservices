name: CI User Service (Reference)

on:
  push:
    branches: [ main ]
    paths:
      - 'user-service/**'
      - 'pom.xml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit tests
        run: mvn -pl user-service test

      - name: Run verification (integration tests)
        # Assuming there are integration tests with Testcontainers
        run: mvn -pl user-service verify -DskipUnitTests=false

  build-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./user-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nazir-user-service:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/nazir-user-service:latest

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/ecommerce
            bash scripts/deploy.sh user-service
