name: PR Checks

on:
  pull_request:
    branches: [ main ]

jobs:
  pr-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile and Unit Test (All Services)
        # Fast feedback: compile and run only unit tests
        run: mvn test -DskipTests=false -Dgroups="!integration"
        
      - name: Check for Dockerfile presence
        run: |
          services=("user-service" "product-service" "order-service" "payment-service" "notification-service" "api-gateway")
          for svc in "${services[@]}"; do
            if [ ! -f "$svc/Dockerfile" ]; then
              echo "Error: $svc/Dockerfile is missing!"
              exit 1
            fi
          done
          echo "All Dockerfiles present."
