# ─────────────────────────────────────────────────────────────────────────────
# user-service/src/main/resources/application.yml
#
# LEARNING POINT — Externalized configuration (12-Factor App, Factor III):
#   Sensitive values (passwords, secrets) come from environment variables.
#   The syntax ${VAR_NAME:default_value} means:
#     → use $VAR_NAME from environment if set, otherwise use default_value.
#   In Docker: set via `environment:` in docker-compose.yml
#   In production: inject from AWS Secrets Manager / HashiCorp Vault
# ─────────────────────────────────────────────────────────────────────────────

spring:
  application:
    name: user-service           # Registered under this name in Eureka

  # ── Config Server ────────────────────────────────────────────────────────────
  # Pull additional config from the central Config Server on startup.
  # optional: means the service still starts if Config Server is unreachable.
  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://configuser:configpassword@localhost:8888}

  # ── Database (PostgreSQL) ────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/userdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      # LEARNING POINT — Connection pool sizing:
      # Formula: pool_size = (core_count * 2) + effective_spindle_count
      # For a 2-core dev machine: (2*2)+1 = 5. Keep small in dev.
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000    # 30 seconds
      idle-timeout: 600000         # 10 minutes
      max-lifetime: 1800000        # 30 minutes
      pool-name: UserServicePool

  jpa:
    hibernate:
      # LEARNING POINT — ddl-auto strategies:
      #   create        → drops and recreates schema on every startup (DEV ONLY)
      #   create-drop   → creates on start, drops on shutdown
      #   update        → tries to alter tables to match entities (RISKY in prod)
      #   validate      → validates schema matches entities, fails if not (PROD)
      #   none          → do nothing (use when Flyway manages the schema)
      ddl-auto: validate           # Flyway creates the schema; JPA only validates
    show-sql: false                # Set to true for debugging N+1 queries
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        # Batch inserts: group multiple INSERT INTO in a single DB round-trip
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true

  # ── Flyway — DB migrations ────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # LEARNING POINT: Flyway reads files in order: V1__..., V2__..., V3__...
    # Naming: V{version}__{description}.sql (double underscore)
    # Never modify an existing migration; always add a new versioned file.

  # ── Redis ─────────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      # Connection pool (Lettuce)
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  # ── Kafka Producer ────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false  # don't add Java class name in headers

# ── Server ────────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8081}
  error:
    include-message: never       # Don't leak internal error messages in prod
    include-stacktrace: never

# ── JWT ────────────────────────────────────────────────────────────────────────
# IMPORTANT: In production, override jwt.secret via environment variable or
# Spring Cloud Config with an encrypted value (e.g. {cipher}...).
jwt:
  secret: ${JWT_SECRET:NazirEcommerceSecretKeyMustBeAtLeast256BitsLongForHS256Algorithm!}
  access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:86400000}     # 24 hours
  refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}  # 7 days

