server:
  port: 8888
spring:
  application:
    name: config-server
  security:
    user:
      name: ${CONFIG_SERVER_USERNAME:configuser}
      password: ${CONFIG_SERVER_PASSWORD:configpassword}
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config
  profiles:
    active: native
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://eurekauser:eurekapassword@localhost:8761/eureka}
