# ─────────────────────────────────────────────────────────────────────────────
#  E-Commerce Microservices — Docker Compose
#
# STARTUP ORDER (enforced via healthchecks + depends_on):
#   infrastructure  →  service-registry  →  config-server
#                   →  api-gateway  →  business services
#
# COMMANDS:
#   Start all          : docker compose up -d
#   Infra only         : docker compose up -d postgres redis kafka zookeeper zipkin
#   Tail logs          : docker compose logs -f user-service
#   Stop everything    : docker compose down
#   Wipe all volumes   : docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────

networks:
  nazir-network:
    driver: bridge

volumes:
  postgres-data:
  mongodb-data:
  redis-data:
  zookeeper-data:
  kafka-data:
  orderdb-data:
  mysql-data:
  elasticsearch-data:

services:

# ═══════════════════════════════════════════════════════════════════════════════
# INFRASTRUCTURE LAYER
# ═══════════════════════════════════════════════════════════════════════════════

  # ── PostgreSQL (user-service DB) ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nazir-postgres
    networks: [nazir-network]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: nazir-mongodb
    networks: [ nazir-network ]
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mongouser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongopassword}
      MONGO_INITDB_DATABASE: productdb
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok" ]
      interval: 10s
      timeout: 5s
      retries: 5

  orderdb:
    image: postgres:16-alpine
    container_name: nazir-orderdb
    networks: [ nazir-network ]
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - orderdb-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d orderdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: nazir-mysql
    networks: [ nazir-network ]
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: paymentdb
#      MYSQL_USER: ${MYSQL_USER:-root}
#      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-paymentpass}
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: nazir-redis
    networks: [nazir-network]
    ports:
      - "6380:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-nazirredis}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-nazirredis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Commander (GUI) ─────────────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: nazir-redis-commander
    networks: [nazir-network]
    depends_on: [redis]
    ports:
      - "8090:8081"
    environment:
      REDIS_HOSTS: "local:redis:6379:0:${REDIS_PASSWORD:-nazirredis}"
    # Browse: http://localhost:8090

  # ── Zookeeper ─────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: nazir-zookeeper
    networks: [nazir-network]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ─────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: nazir-kafka
    networks: [nazir-network]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Kafdrop (Kafka UI) ────────────────────────────────────────────────────────
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: nazir-kafdrop
    networks: [nazir-network]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
    # Browse topics: http://localhost:9000

  # ── Zipkin (distributed tracing) ──────────────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: nazir-zipkin
    networks: [nazir-network]
    ports:
      - "9411:9411"
    # Trace viewer: http://localhost:9411

  # ── Mailhog (local SMTP + email UI) ───────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: nazir-mailhog
    networks: [nazir-network]
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    # View emails: http://localhost:8025

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: nazir-prometheus
    networks: [nazir-network]
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: nazir-grafana
    networks: [nazir-network]
    depends_on: [prometheus]
    ports:
      - "3001:3000"
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

# ═══════════════════════════════════════════════════════════════════════════════
# PLATFORM SERVICES (Spring Cloud)
# ═══════════════════════════════════════════════════════════════════════════════

  # ── Service Registry (Eureka) ─────────────────────────────────────────────────
  service-registry:
    image: ghcr.io/${GHCR_USER:-you}/nazir-service-registry:latest
    build:
      context: .
      dockerfile: service-registry/Dockerfile
    container_name: nazir-service-registry
    networks: [nazir-network]
    ports:
      - "8761:8761"
    environment:
      EUREKA_USERNAME: ${EUREKA_USERNAME:-eurekauser}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eurekapassword}
      ZIPKIN_URL: http://zipkin:9411
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://eurekauser:eurekapassword@localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
    # Dashboard: http://localhost:8761 (eurekauser / eurekapassword)

  # ── Config Server ─────────────────────────────────────────────────────────────
  config-server:
    image: ghcr.io/${GHCR_USER:-you}/nazir-config-server:latest
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: nazir-config-server
    networks: [nazir-network]
    depends_on:
      service-registry:
        condition: service_healthy
    ports:
      - "8888:8888"
    environment:
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configpassword}
      EUREKA_URI: http://${EUREKA_USERNAME:-eurekauser}:${EUREKA_PASSWORD:-eurekapassword}@service-registry:8761/eureka
      ZIPKIN_URL: http://zipkin:9411
      SPRING_PROFILES_ACTIVE: docker,native
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--header=Authorization: Basic Y29uZmlndXNlcjpjb25maWdwYXNzd29yZA==", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── API Gateway ───────────────────────────────────────────────────────────────
  api-gateway:
    image: ghcr.io/${GHCR_USER:-you}/nazir-api-gateway:latest
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: nazir-api-gateway
    networks: [nazir-network]
    depends_on:
      service-registry:
        condition: service_healthy
      config-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      CONFIG_SERVER_URI: http://configuser:configpassword@config-server:8888
      EUREKA_URI: http://${EUREKA_USERNAME:-eurekauser}:${EUREKA_PASSWORD:-eurekapassword}@service-registry:8761/eureka
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-nazirredis}
      JWT_SECRET: ${JWT_SECRET:-NazirEcommerceSecretKeyMustBeAtLeast256BitsLongForHS256Algorithm!}
      ZIPKIN_URL: http://zipkin:9411
      SPRING_PROFILES_ACTIVE: docker

# ═══════════════════════════════════════════════════════════════════════════════
# BUSINESS SERVICES
# ═══════════════════════════════════════════════════════════════════════════════

  # ── User Service ──────────────────────────────────────────────────────────────
  user-service:
    image: ghcr.io/${GHCR_USER:-you}/nazir-user-service:latest
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: nazir-user-service
    networks: [nazir-network]
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      CONFIG_SERVER_URI: http://configuser:configpassword@config-server:8888
      EUREKA_URI: http://${EUREKA_USERNAME:-eurekauser}:${EUREKA_PASSWORD:-eurekapassword}@service-registry:8761/eureka
      DB_URL: jdbc:postgresql://postgres:5432/userdb
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASS: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-nazirredis}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-NazirEcommerceSecretKeyMustBeAtLeast256BitsLongForHS256Algorithm!}
      ZIPKIN_URL: http://zipkin:9411
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Product Service ───────────────────────────────────────────────────────────
  product-service:
    image: ghcr.io/${GHCR_USER:-you}/nazir-product-service:latest
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: nazir-product-service
    networks: [ nazir-network ]
    depends_on:
      config-server:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      CONFIG_SERVER_URI: http://configuser:configpassword@config-server:8888
      EUREKA_URI: http://${EUREKA_USERNAME:-eurekauser}:${EUREKA_PASSWORD:-eurekapassword}@service-registry:8761/eureka
      MONGODB_URI: mongodb://${MONGO_USER:-mongouser}:${MONGO_PASSWORD:-mongopassword}@mongodb:27017/productdb?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-nazirredis}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ZIPKIN_URL: http://zipkin:9411
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Order Service ─────────────────────────────────────────────────────────────
  order-service:
    image: ghcr.io/${GHCR_USER:-you}/nazir-order-service:latest
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: nazir-order-service
    networks: [ nazir-network ]
    depends_on:
      config-server:
        condition: service_healthy
      orderdb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      CONFIG_SERVER_URI: http://configuser:configpassword@config-server:8888
      EUREKA_URI: http://${EUREKA_USERNAME:-eurekauser}:${EUREKA_PASSWORD:-eurekapassword}@service-registry:8761/eureka
      DB_URL: jdbc:postgresql://orderdb:5432/orderdb
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASS: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ZIPKIN_URL: http://zipkin:9411
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Payment Service ───────────────────────────────────────────────────────────
  payment-service:
    image: ghcr.io/${GHCR_USER:-you}/nazir-payment-service:latest
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: nazir-payment-service
    networks: [ nazir-network ]
    depends_on:
      config-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      CONFIG_SERVER_URI: http://configuser:configpassword@config-server:8888
      EUREKA_URI: http://${EUREKA_USERNAME:-eurekauser}:${EUREKA_PASSWORD:-eurekapassword}@service-registry:8761/eureka
      DB_URL: jdbc:mysql://mysql:3306/paymentdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASS: ${MYSQL_ROOT_PASSWORD:-root}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ZIPKIN_URL: http://zipkin:9411
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Notification Service ──────────────────────────────────────────────────────
  notification-service:
    image: ghcr.io/${GHCR_USER:-you}/nazir-notification-service:latest
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: nazir-notification-service
    networks: [ nazir-network ]
    depends_on:
      config-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      CONFIG_SERVER_URI: http://configuser:configpassword@config-server:8888
      EUREKA_URI: http://${EUREKA_USERNAME:-eurekauser}:${EUREKA_PASSWORD:-eurekapassword}@service-registry:8761/eureka
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-nazirredis}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      ZIPKIN_URL: http://zipkin:9411
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: nazir-elasticsearch
    networks: [nazir-network]
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"   # disable auth for local dev
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  kibana:
    image: kibana:8.11.0
    container_name: nazir-kibana
    networks: [nazir-network]
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
    # Logs: http://localhost:5601

  logstash:
    image: logstash:8.11.0
    container_name: nazir-logstash
    networks: [nazir-network]
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5044:5044/tcp"
      - "5044:5044/udp"
    volumes:
      - ./infrastructure/logstash/pipeline:/usr/share/logstash/pipeline:ro
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
